<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Request Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* স্মুথ অ্যানিমেশনের জন্য */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 fade-in">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-cyan-400 tracking-wide uppercase">Request Controller</h1>
            <p class="text-slate-400 text-sm mt-1">Enter details to trigger the API endpoint</p>
        </div>

        <form id="apiForm" class="space-y-5">
            <div>
                <label for="number" class="block text-sm font-medium text-slate-300 mb-1">Target Number</label>
                <input type="tel" id="number" name="number" required placeholder="e.g. 017XXXXXXXX" 
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl focus:outline-none focus:border-cyan-500 text-slate-100 placeholder-slate-500 transition-all">
            </div>

            <div>
                <label for="amount" class="block text-sm font-medium text-slate-300 mb-1">Amount / Count</label>
                <input type="number" id="amount" name="amount" required placeholder="e.g. 36" 
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-xl focus:outline-none focus:border-cyan-500 text-slate-100 placeholder-slate-500 transition-all">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-semibold py-3 px-4 rounded-xl transition-all duration-200 transform active:scale-95 shadow-lg shadow-cyan-500/20 cursor-pointer">
                Send Request
            </button>
        </form>

        <div id="statusBox" class="mt-6 p-4 rounded-xl hidden text-sm font-medium text-center"></div>
    </div>

    <script>
        document.getElementById('apiForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const number = document.getElementById('number').value;
            const amount = document.getElementById('amount').value;
            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');

            // লোডিং স্টেট সেট করা
            submitBtn.disabled = true;
            submitBtn.innerText = 'Sending...';
            statusBox.className = "mt-6 p-4 rounded-xl text-sm font-medium text-center bg-slate-700 text-slate-300";
            statusBox.innerText = "Processing your request, please wait...";
            statusBox.classList.remove('hidden');

            try {
                // API কল করা
                const response = await fetch('https://saifulbomb.vercel.app/bomb', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        number: number,
                        amount: amount
                    })
                });

                // রেসপন্স চেক করা
                if (response.ok) {
                    const data = await response.json().catch(() => null);
                    statusBox.className = "mt-6 p-4 rounded-xl text-sm font-medium text-center bg-emerald-500/10 border border-emerald-500 text-emerald-400";
                    statusBox.innerText = "Success! Request sent successfully.";
                    console.log('Success Data:', data);
                } else {
                    statusBox.className = "mt-6 p-4 rounded-xl text-sm font-medium text-center bg-rose-500/10 border border-rose-500 text-rose-400";
                    statusBox.innerText = `Failed! Server responded with status: ${response.status}`;
                }

            } catch (error) {
                // নেটওয়ার্ক বা অন্য কোনো এরর হলে
                statusBox.className = "mt-6 p-4 rounded-xl text-sm font-medium text-center bg-rose-500/10 border border-rose-500 text-rose-400";
                statusBox.innerText = "Error: Could not connect to the API server.";
                console.error('Error details:', error);
            } finally {
                // বাটন আগের অবস্থায় ফিরিয়ে আনা
                submitBtn.disabled = false;
                submitBtn.innerText = 'Send Request';
            }
        });
    </script>
</body>
</html>
