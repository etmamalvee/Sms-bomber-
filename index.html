<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Request Sender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #response {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Send Request</h2>
    <form id="apiForm">
        <div class="form-group">
            <label for="number">Phone Number:</label>
            <input type="text" id="number" placeholder="01*********" required>
        </div>
        <div class="form-group">
            <label for="amount">Amount:</label>
            <input type="number" id="amount" value="36" required>
        </div>
        <button type="submit" id="submitBtn">Submit</button>
    </form>
    
    <div id="response"></div>
</div>

<script>
    document.getElementById('apiForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Page reload bondho korar jonne
        
        const number = document.getElementById('number').value;
        const amount = document.getElementById('amount').value;
        const responseDiv = document.getElementById('response');
        const submitBtn = document.getElementById('submitBtn');
        
        // Button disable & loading text
        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending...';
        responseDiv.style.display = 'none';

        try {
            const response = await fetch('https://saifulbomb.vercel.app/bomb', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    number: number,
                    amount: amount
                })
            });

            const data = await response.json(); // API jodi json return kore
            
            responseDiv.style.display = 'block';
            responseDiv.style.backgroundColor = '#d4edda';
            responseDiv.style.color = '#155724';
            responseDiv.innerText = 'Success! Request Sent.';
            console.log(data);
        } catch (error) {
            responseDiv.style.display = 'block';
            responseDiv.style.backgroundColor = '#f8d7da';
            responseDiv.style.color = '#721c24';
            responseDiv.innerText = 'Error: Request failed or CORS issue!';
            console.error('Error:', error);
        } finally {
            // Button normal obosthay ferot ana
            submitBtn.disabled = false;
            submitBtn.innerText = 'Submit';
        }
    });
</script>

</body>
</html>
